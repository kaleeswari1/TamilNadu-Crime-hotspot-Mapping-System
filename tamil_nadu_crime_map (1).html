<style>
:root{--bg:#0d1117;--panel:#161b22;--border:#30363d;--accent:#f85149;--accent2:#d29922;--text:#e6edf3;--muted:#8b949e;--green:#3fb950;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-badge{background:var(--accent);color:white;font-size:11px;font-weight:700;padding:4px 8px;border-radius:4px;letter-spacing:1px;}
.logo-title{font-size:15px;font-weight:700;}
.logo-sub{font-size:10px;color:var(--muted);}
.hdr-stats{display:flex;gap:24px;}
.hdr-stat{text-align:right;}
.hdr-stat-val{font-size:17px;font-weight:700;color:var(--accent);font-family:monospace;}
.hdr-stat-label{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

.main{display:flex;flex:1;overflow:hidden;}

.sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sb-section{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:monospace;margin-bottom:7px;}

input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:8px 11px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s;}
input[type=text]:focus{border-color:var(--accent);}
input[type=text]::placeholder{color:var(--muted);}

.dd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--panel);border:1px solid var(--accent);border-radius:4px;max-height:160px;overflow-y:auto;z-index:9999;display:none;}
.dd.open{display:block;}
.dd-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;}
.dd-item:hover{background:rgba(248,81,73,.1);color:var(--accent);}
.dd-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}

.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.chip{padding:3px 8px;border-radius:10px;font-size:10px;font-family:monospace;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.chip:hover{border-color:var(--accent2);color:var(--accent2);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.dist-list{flex:1;overflow-y:auto;padding:6px;}
.dist-list::-webkit-scrollbar{width:3px;}
.dist-list::-webkit-scrollbar-thumb{background:var(--border);}
.list-hdr{font-size:9px;color:var(--muted);letter-spacing:2px;font-family:monospace;padding:5px 8px 3px;}
.dist-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:7px 9px;background:transparent;border:none;border-left:2px solid transparent;border-radius:3px;color:var(--text);font-size:12px;cursor:pointer;transition:all .13s;text-align:left;margin-bottom:1px;}
.dist-btn:hover{background:rgba(248,81,73,.07);color:var(--accent);}
.dist-btn.on{background:rgba(248,81,73,.12);color:var(--accent);border-left-color:var(--accent);}
.badge{font-family:monospace;font-size:10px;color:var(--accent2);background:rgba(210,153,34,.12);padding:1px 5px;border-radius:2px;}

.info-box{padding:12px 14px;border-top:1px solid var(--border);}
.info-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:7px;}
.info-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-family:monospace;margin-bottom:3px;}
.info-row span:last-child{color:var(--text);}
.no-sel{font-size:11px;color:var(--muted);font-style:italic;}
.bars{margin-top:8px;}
.bar-row{margin-bottom:4px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);font-family:monospace;margin-bottom:2px;}
.bar-track{height:3px;background:var(--border);border-radius:2px;}
.bar-fill{height:3px;border-radius:2px;transition:width .4s;}

.legend{padding:10px 14px;border-top:1px solid var(--border);}
.leg-bar{width:100%;height:5px;border-radius:3px;margin-top:5px;background:linear-gradient(to right,#3b82f688,#22c55e88,#eab30888,#ef444488);}
.leg-ends{display:flex;justify-content:space-between;margin-top:2px;font-size:9px;color:var(--muted);font-family:monospace;}

#map{flex:1;height:100%;min-height:0;}

.overlay{position:absolute;top:14px;right:14px;background:rgba(13,17,23,.93);border:1px solid var(--border);border-radius:6px;padding:12px 15px;z-index:500;min-width:190px;backdrop-filter:blur(8px);}
.ov-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.ov-total{font-size:28px;font-weight:700;color:var(--accent);font-family:monospace;line-height:1;}
.ov-sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px;margin-bottom:8px;}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.ov-item{font-size:10px;font-family:monospace;}
.ov-lbl{color:var(--muted);}
</style>
</head>

<header>
  <div class="logo">
    <div class="logo-badge">TN CRIME</div>
    <div><div class="logo-title">Tamil Nadu Crime Hotspot Map</div><div class="logo-sub">9 Districts · 121 Areas · Real Data</div></div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat"><div class="hdr-stat-val">9</div><div class="hdr-stat-label">Districts</div></div>
    <div class="hdr-stat"><div class="hdr-stat-val">121</div><div class="hdr-stat-label">Areas</div></div>

<div class="main">
  <div class="sidebar">

        <div class="dd" id="dd"></div>
      </div>
    </div>

    <div class="sb-section">

        <button class="chip" data-c="Burglary">Burglary</button>
        <button class="chip" data-c="Robbery">Robbery</button>
        <button class="chip" data-c="Assault">Assault</button>
        <button class="chip" data-c="Vehicle Theft">Vehicle</button>
        <button class="chip" data-c="Fraud">Fraud</button>
        <button class="chip" data-c="Cyber Crime">Cyber</button>
      </div>
    </div>

    <div class="dist-list" id="distList">
      <div class="list-hdr">ALL DISTRICTS — RANKED BY TOTAL</div>
    </div>

    <div class="info-box" id="infoBox"><div class="no-sel">← Select a district to view details</div></div>

    <div class="legend">
      <div class="sb-label">Heatmap Intensity</div>
      <div class="leg-bar"></div>
      <div class="leg-ends"><span>LOW</span><span>HIGH</span></div>
    </div>
  </div>

  <div style="position:relative;flex:1;height:100%;min-height:0;overflow:hidden;">
    <div id="map"></div>
    <div class="overlay" id="overlay"><div class="no-sel" style="font-size:11px;">Select a district</div></div>
  </div>
</div>

const CT = ['Theft','Burglary','Robbery','Assault','Vehicle Theft','Fraud','Cyber Crime'];
const CC = {'Theft':'#f85149','Burglary':'#d29922','Robbery':'#f0883e','Assault':'#ff7eb6','Vehicle Theft':'#58a6ff','Fraud':'#bc8cff','Cyber Crime':'#3fb950'};

let activeCrime = 'total', activeDist = null, circles = [], heatCircles = [];

// ── INIT MAP ───────────────────────────────────────────────────
const map = L.map('map', {zoomControl: true}).setView([10.8, 78.0], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// ── DISTRICT LIST ──────────────────────────────────────────────
const listEl = document.getElementById('distList');
Object.entries(D).sort((a,b)=>b[1].total-a[1].total).forEach(([name,d])=>{
  const btn = document.createElement('button');
  btn.className='dist-btn'; btn.dataset.n=name;
  btn.innerHTML=`<span>${name}</span><span class="badge">${d.total}</span>`;
  btn.onclick=()=>pick(name);
  listEl.appendChild(btn);
});

// ── SEARCH ─────────────────────────────────────────────────────
const si=document.getElementById('searchInput'), dd=document.getElementById('dd');
si.oninput=()=>{
  const q=si.value.toLowerCase().trim(); dd.innerHTML='';
  if(!q){dd.classList.remove('open');return;}
  const m=Object.keys(D).filter(n=>n.toLowerCase().includes(q));
  if(!m.length){dd.classList.remove('open');return;}
  m.forEach(name=>{
    const el=document.createElement('div'); el.className='dd-item';
    el.innerHTML=`<div class="dd-dot"></div>${name}`;
    el.onclick=()=>{pick(name);si.value='';dd.classList.remove('open');};
    dd.appendChild(el);
  });
  dd.classList.add('open');
};
document.addEventListener('click',e=>{if(!e.target.closest('#searchInput')&&!e.target.closest('#dd'))dd.classList.remove('open');});

// ── CHIPS ──────────────────────────────────────────────────────
document.getElementById('chips').onclick=e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); activeCrime=c.dataset.c;
  if(activeDist)renderMarkers(activeDist);
};

// ── PICK DISTRICT ──────────────────────────────────────────────
function pick(name){
  activeDist=name;
  document.querySelectorAll('.dist-btn').forEach(b=>b.classList.toggle('on',b.dataset.n===name));
  document.querySelector(`.dist-btn[data-n="${name}"]`)?.scrollIntoView({block:'nearest',behavior:'smooth'});
  renderMarkers(name);
  updateInfo(name);
  updateOverlay(name);
  const d=D[name];
  map.flyTo([d.lat,d.lon],12,{duration:1.5});
}

function gv(a,c){return c==='total'?a.total:(a[c]||0);}

function renderMarkers(name){
  // clear old
  circles.forEach(c=>map.removeLayer(c));
  heatCircles.forEach(c=>map.removeLayer(c));
  circles=[]; heatCircles=[];

  const d=D[name];
  const vals=d.areas.map(a=>gv(a,activeCrime));
  const mx=Math.max(...vals,1);

  d.areas.forEach(area=>{
    const v=gv(area,activeCrime), ratio=v/mx;
    const col=ratio>0.7?'#f85149':ratio>0.4?'#d29922':ratio>0.15?'#58a6ff':'#3fb950';
    const r=Math.max(150,ratio*600); // metres radius

    // Heat glow circle
    const heat=L.circle([area.lat,area.lon],{
      radius:r*2.5, color:'transparent',
      fillColor:col, fillOpacity:0.15, interactive:false
    }).addTo(map);
    heatCircles.push(heat);

    // Main marker circle
    const circ=L.circle([area.lat,area.lon],{
      radius:r, color:col, weight:2,
      fillColor:col, fillOpacity:0.55
    }).bindPopup(buildPopup(area), {maxWidth:230}).addTo(map);
    circles.push(circ);
  });
}

function buildPopup(a){
  const rows=CT.map(c=>`
    <div style="display:flex;justify-content:space-between;font-size:10px;font-family:monospace;margin-bottom:2px;">
      <span style="color:#8b949e">${c}</span>
      <span style="color:${CC[c]};font-weight:700">${a[c]}</span>
    </div>`).join('');
  return `<div style="font-family:system-ui;min-width:165px;">
    <div style="font-weight:700;font-size:14px;margin-bottom:3px;">${a.name}</div>
    <div style="font-size:11px;color:#f85149;font-family:monospace;margin-bottom:8px;">Total: ${a.total} incidents</div>
    ${rows}
  </div>`;
}

function updateInfo(name){
  const d=D[name];
  const top=d.areas.reduce((m,a)=>a.total>m.total?a:m);
  const cs=ct=>d.areas.reduce((s,a)=>s+(a[ct]||0),0);
  const dom=CT.reduce((m,c)=>cs(c)>cs(m)?c:m,CT[0]);
  const bars=CT.map(ct=>{
    const v=cs(ct),pct=Math.round(v/d.total*100);
    return `<div class="bar-row">
      <div class="bar-lbl"><span>${ct}</span><span>${v}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${CC[ct]};"></div></div>
    </div>`;
  }).join('');
  document.getElementById('infoBox').innerHTML=`
    <div class="info-title">${name}</div>
    <div class="info-row"><span>TOTAL</span><span>${d.total}</span></div>
    <div class="info-row"><span>AREAS</span><span>${d.areas.length}</span></div>
    <div class="info-row"><span>TOP AREA</span><span>${top.name}</span></div>
    <div class="info-row"><span>DOMINANT</span><span>${dom}</span></div>
    <div class="bars">${bars}</div>`;
}

function updateOverlay(name){
  const d=D[name];
  const cs=ct=>d.areas.reduce((s,a)=>s+(a[ct]||0),0);
  const grid=CT.map(ct=>`<div class="ov-item"><span class="ov-lbl">${ct.split(' ')[0]}: </span><span style="color:${CC[ct]};font-weight:700">${cs(ct)}</span></div>`).join('');
  document.getElementById('overlay').innerHTML=`
    <div class="ov-name">${name}</div>
    <div class="ov-total">${d.total}</div>
    <div class="ov-sub">TOTAL INCIDENTS · ${d.areas.length} AREAS</div>
    <div class="ov-grid">${grid}</div>`;
}

// ── HEADER TOTAL ───────────────────────────────────────────────
document.getElementById('hdrTotal').textContent =
  Object.values(D).reduce((s,d)=>s+d.total,0);

// Force map to re-render after layout settles
setTimeout(()=>map.invalidateSize(), 200);
</script>
</body>
</html>
